name: UI/UX 개선
description: 화면 구성, 반응형 동작, 접근성과 상호작용을 개선합니다.
title: "[UI/UX] "
labels:
  - "유형: 개선"
assignees:
  - hadevyi
body:
  - type: textarea
    id: target
    attributes:
      label: 대상 화면
      description: 변경할 페이지, 컴포넌트와 사용자 흐름을 적어 주세요.
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 현재 문제
      description: 가독성, 배치, 상호작용 또는 접근성 문제를 구체적으로 적어 주세요.
    validations:
      required: true

  - type: textarea
    id: direction
    attributes:
      label: 개선 방향
      description: 유지할 요소와 변경할 시각·동작 기준을 적어 주세요.
    validations:
      required: true

  - type: checkboxes
    id: considerations
    attributes:
      label: 확인 항목
      options:
        - label: 기존 디자인 시스템과 일관성을 유지한다.
        - label: 데스크톱과 모바일 화면을 함께 확인한다.
        - label: 키보드 조작과 접근성 상태를 확인한다.
        - label: 다크 모드 또는 출력 환경의 영향 여부를 확인한다.

  - type: textarea
    id: checklist
    attributes:
      label: 체크리스트
      placeholder: |
        - [ ] 화면 구현
        - [ ] 반응형 확인
        - [ ] 접근성 확인
        - [ ] 시각 검증
    validations:
      required: true

  - type: textarea
    id: done
    attributes:
      label: 완료 기준
      description: 화면과 상호작용을 어떤 조건에서 완료로 판단할지 적어 주세요.
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: 참고 자료
      description: 현재 화면, 목표 이미지, 디자인 문서 등을 첨부해 주세요.
