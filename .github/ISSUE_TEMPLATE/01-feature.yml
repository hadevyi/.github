name: 기능 개발·개선
description: 새로운 기능을 구현하거나 기존 동작을 개선합니다.
title: "[기능] "
assignees:
  - hadevyi
body:
  - type: markdown
    attributes:
      value: 관련된 열린 이슈와 현재 구현을 먼저 확인해 주세요.

  - type: textarea
    id: purpose
    attributes:
      label: 목적
      description: 해결하려는 문제와 기대하는 변화를 적어 주세요.
    validations:
      required: true

  - type: textarea
    id: background
    attributes:
      label: 배경
      description: 현재 동작, 제약 조건, 결정 배경을 적어 주세요.

  - type: textarea
    id: requirements
    attributes:
      label: 요구사항
      description: 사용자가 확인할 수 있는 동작을 기준으로 작성해 주세요.
      placeholder: |
        - 사용자는 ...할 수 있다.
        - ...일 때 ...로 동작한다.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: 작업 범위
      description: 포함할 작업과 이번 이슈에서 제외할 내용을 적어 주세요.
    validations:
      required: true

  - type: textarea
    id: checklist
    attributes:
      label: 체크리스트
      placeholder: |
        - [ ] 구현
        - [ ] 예외 처리
        - [ ] 검증
    validations:
      required: true

  - type: textarea
    id: done
    attributes:
      label: 완료 기준
      description: 이슈를 종료할 수 있는 객관적인 기준을 적어 주세요.
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: 참고 자료
      description: 관련 이슈, 문서, 화면, API 등이 있다면 첨부해 주세요.
